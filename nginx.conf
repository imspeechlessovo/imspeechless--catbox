# /etc/nginx/sites-available/maoxiang
# Copy to: /etc/nginx/sites-available/maoxiang
# Enable: ln -s /etc/nginx/sites-available/maoxiang /etc/nginx/sites-enabled/
# Test: nginx -t
# Reload: nginx -s reload

server {
    listen 80;
    server_name your-domain.com;  # Change this!

    # Upload size limit for card images
    client_max_body_size 6M;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # For HTTPS (after certbot):
    # listen 443 ssl;
    # ssl_certificate /etc/letsencrypt/live/your-domain.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/your-domain.com/privkey.pem;
}
